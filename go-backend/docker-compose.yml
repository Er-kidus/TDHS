version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pharmacy-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - pharmacy-network

  auth-service:
    build: .
    command: go run cmd/auth-service/main.go
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/pharmacy_db?sslmode=disable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      AUTH_SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
    networks:
      - pharmacy-network

  pharmacy-service:
    build: .
    command: go run cmd/pharmacy-service/main.go
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/pharmacy_db?sslmode=disable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PHARMACY_SERVICE_PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
    networks:
      - pharmacy-network

  emr-service:
    build: .
    command: go run cmd/emr-service/main.go
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/pharmacy_db?sslmode=disable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      EMR_SERVICE_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - redis
    networks:
      - pharmacy-network

  prescription-service:
    build: .
    command: go run cmd/prescription-service/main.go
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/pharmacy_db?sslmode=disable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PRESCRIPTION_SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      - postgres
      - redis
    networks:
      - pharmacy-network

  api-gateway:
    build: .
    command: go run cmd/api-gateway/main.go
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      PHARMACY_SERVICE_URL: http://pharmacy-service:8002
      EMR_SERVICE_URL: http://emr-service:8003
      PRESCRIPTION_SERVICE_URL: http://prescription-service:8004
      API_GATEWAY_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - pharmacy-service
      - emr-service
      - prescription-service
    networks:
      - pharmacy-network

volumes:
  postgres_data:

networks:
  pharmacy-network:
    driver: bridge
